name: release

# Changesets release flow:
#   1. Land PRs that include a changeset (`.changeset/*.md`) on main.
#   2. This workflow opens/updates a "Version Packages" PR that bumps versions
#      and updates changelogs from the pending changesets.
#   3. Merging that PR (which removes the changesets) makes this workflow run
#      `changeset publish`, publishing the changed packages to npm.
#
# Requires an NPM_TOKEN repo secret (an npm automation token with publish rights).
on:
  push:
    branches: [main]

concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: write
  pull-requests: write
  id-token: write # npm provenance

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install
        run: pnpm install --frozen-lockfile

      - name: Create Release PR or Publish
        uses: changesets/action@v1
        with:
          # release:ci builds + format-checks then runs `changeset publish`
          # (the action itself handles git commits/tags, so no git push here).
          publish: pnpm release:ci
          version: pnpm changeset version
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
